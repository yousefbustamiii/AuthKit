<!DOCTYPE html>
<html>

<body style="margin:0; padding:0; background-color:#f5f7fa;">
    <table width="100%" cellpadding="0" cellspacing="0" style="padding:60px 0;">
        <tr>
            <td align="center">
                <table width="420" cellpadding="0" cellspacing="0"
                    style="background-color:#ffffff; padding:48px 32px; text-align:center; border-radius:10px; font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;">
                    <tr>
                        <td style="font-size:20px; font-weight:600; color:#27ae60; padding-bottom:18px;">
                            Subscription resumed
                        </td>
                    </tr>
                    <tr>
                        <td style="font-size:15px; color:#444444; line-height:22px; padding-bottom:32px;">
                            The <strong>{{ plan }}</strong> subscription for <strong>{{ org_name }}</strong>
                            on <strong>{{ app_name }}</strong> has been successfully resumed. Full access to
                            paid features has been restored.
                        </td>
                    </tr>
                    <tr>
                        <td style="font-size:14px; color:#666666; padding-bottom:6px;">
                            Plan
                        </td>
                    </tr>
                    <tr>
                        <td style="font-size:15px; font-weight:500; color:#111111; padding-bottom:32px;">
                            {{ plan }}
                        </td>
                    </tr>
                    <tr>
                        <td style="font-size:14px; color:#666666; padding-bottom:6px;">
                            Processed by
                        </td>
                    </tr>
                    <tr>
                        <td style="font-size:15px; font-weight:500; color:#111111; padding-bottom:18px;">
                            {{ device }}
                        </td>
                    </tr>
                    <tr>
                        <td style="font-size:14px; color:#666666; padding-bottom:6px;">
                            Time
                        </td>
                    </tr>
                    <tr>
                        <td style="font-size:15px; font-weight:500; color:#111111; padding-bottom:32px;">
                            {{ timestamp }}
                        </td>
                    </tr>
                    <tr>
                        <td style="font-size:13px; color:#999999; line-height:18px;">
                            If you did not expect this, please contact support immediately.
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>

</html>

<!DOCTYPE html>
<html>

<body style="margin:0; padding:0; background-color:#f5f7fa;">
    <table width="100%" cellpadding="0" cellspacing="0" style="padding:60px 0;">
        <tr>
            <td align="center">
                <table width="420" cellpadding="0" cellspacing="0"
                    style="background-color:#ffffff; padding:48px 32px; text-align:center; border-radius:10px; font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;">
                    <tr>
                        <td style="font-size:20px; font-weight:600; color:#111111; padding-bottom:18px;">
                            You've been invited to join {{ org_name }}
                        </td>
                    </tr>
                    <tr>
                        <td style="font-size:15px; color:#444444; line-height:22px; padding-bottom:32px;">
                            You have been invited to join <strong>{{ org_name }}</strong> on {{ app_name }}
                            as a <strong>{{ role }}</strong>. Use the code below to accept your invitation.
                        </td>
                    </tr>
                    <tr>
                        <td style="font-size:36px; font-weight:500; letter-spacing:6px; color:#000000; padding:24px 0; font-family:monospace;">
                            {{ token }}
                        </td>
                    </tr>
                    <tr>
                        <td style="font-size:14px; color:#666666; padding-top:8px;">
                            This invitation expires in 7 days.
                        </td>
                    </tr>
                    <tr>
                        <td style="font-size:13px; color:#999999; padding-top:36px; line-height:18px;">
                            If you did not expect this invitation, you can safely ignore this email.
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>

</html>
